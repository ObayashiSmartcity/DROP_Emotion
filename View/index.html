<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>東京建築祭DROP VIEWER</title>
  <meta name="description" content="東京建築祭DROPデータを地図と一覧で横断閲覧できるHTMLビューワー" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    :root { --bg:#f7f3ec; --panel:rgba(255,255,255,.82); --panel-strong:rgba(255,255,255,.95); --line:#ddd3c5; --text:#1d1b17; --muted:#706659; --accent:#8e6b45; --accent-strong:#6f4f2d; --accent-soft:#efe6db; --shadow:0 18px 48px rgba(48,37,17,.1); --radius-xl:28px; --card-gap:18px; }
    * { box-sizing: border-box; } html,body { height:100%; } body { margin:0; font-family:'Noto Sans JP',system-ui,sans-serif; color:var(--text); background:radial-gradient(circle at top left, rgba(142,107,69,.10), transparent 32%), radial-gradient(circle at top right, rgba(201,185,163,.18), transparent 28%), linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%); }
    .shell { max-width:1560px; margin:0 auto; padding:22px; } .hero { position:sticky; top:0; z-index:40; padding:18px 22px 14px; margin-bottom:16px; border:1px solid rgba(201,185,163,.7); background:rgba(250,247,241,.84); backdrop-filter:blur(18px); border-radius:0 0 var(--radius-xl) var(--radius-xl); box-shadow:0 16px 40px rgba(65,52,31,.10); }
    .hero-top { display:flex; gap:18px; align-items:end; justify-content:space-between; flex-wrap:wrap; } .title-wrap h1 { margin:0; font-family:'Noto Serif JP',serif; font-size:clamp(2rem,4vw,3.2rem); } .title-wrap p { margin:6px 0 0; color:var(--muted); }
    .meta-stat-grid,.chip-row,.legend,.action-row,.toolbar-left,.tabs,.seg,.meta { display:flex; flex-wrap:wrap; gap:10px; } .stat-pill,.chip,.meta span,.badge,.action-btn,.seg button { border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.85); }
    .stat-pill { padding:10px 14px; color:var(--muted); } .stat-pill strong { color:var(--text); } .layout { display:grid; grid-template-columns:390px minmax(0,1fr); gap:22px; align-items:start; }
    .panel { background:var(--panel); backdrop-filter:blur(10px); border:1px solid rgba(201,185,163,.72); border-radius:var(--radius-xl); box-shadow:var(--shadow); } .filters { position:sticky; top:132px; overflow:hidden; } .filters header { padding:20px 22px 10px; border-bottom:1px solid rgba(201,185,163,.55); } .filters .controls { padding:18px 22px 22px; display:grid; gap:14px; }
    .control { display:grid; gap:8px; } .control label { font-size:.88rem; color:var(--muted); font-weight:700; } .control input,.control select { width:100%; min-height:46px; border:1px solid var(--line); background:rgba(255,255,255,.9); border-radius:13px; padding:11px 14px; font:inherit; color:var(--text); }
    .inline-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; } .seg button,.action-btn,.tabs button { padding:10px 14px; font:inherit; cursor:pointer; } .seg button.active,.action-btn:hover,.tabs button.active { background:var(--accent-soft); border-color:var(--accent); color:var(--accent-strong); } .action-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .content-stack { display:grid; gap:18px; } .toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; } .tabs { padding:10px; background:rgba(255,255,255,.62); border-radius:999px; border:1px solid rgba(201,185,163,.65); width:fit-content; } .tabs button { border:0; background:transparent; color:var(--muted); font-weight:700; border-radius:999px; }
    .screen { display:none; } .screen.active { display:block; } .map-card { overflow:hidden; } #map { height:calc(100vh - 248px); min-height:560px; border-radius:var(--radius-xl); background:#eee; }
    .list-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(306px,1fr)); gap:var(--card-gap); } .card { background:var(--panel-strong); border-radius:22px; overflow:hidden; border:1px solid rgba(201,185,163,.7); box-shadow:0 14px 38px rgba(62,49,24,.08); display:grid; grid-template-rows:auto 1fr; }
    .media { position:relative; aspect-ratio:16 / 10; background:linear-gradient(120deg, #f0ebe1 0%, #e5ddd0 100%); overflow:hidden; } .media img { width:100%; height:100%; object-fit:cover; display:block; } .no-image { position:absolute; inset:0; display:grid; place-items:center; color:var(--muted); font-size:.92rem; } .badge-stack { position:absolute; top:12px; left:12px; display:flex; gap:8px; flex-wrap:wrap; }
    .badge { padding:7px 10px; font-size:.78rem; font-weight:700; backdrop-filter:blur(8px); } .badge.public { color:#1e6a40; } .badge.private { color:#914040; } .badge.official { color:var(--accent-strong); } .body { padding:18px; display:grid; gap:12px; align-content:start; }
    .card h3 { margin:0; font-size:1.08rem; line-height:1.5; } .meta { color:var(--muted); font-size:.86rem; } .meta span { padding:6px 10px; background:#f5f1ea; border-color:#ebe1d2; } .desc { margin:0; line-height:1.8; color:#413b32; font-size:.96rem; display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; } .mono { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:.8rem; color:var(--muted); }
    .empty-state { padding:46px 28px; text-align:center; color:var(--muted); } .legend span { display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-size:.88rem; } .dot { width:12px; height:12px; border-radius:50%; display:inline-block; } .dot.public { background:#3f8f5c; } .dot.private { background:#ca6c6c; } .dot.official { background:#9f7a45; }
    .map-popup { min-width:280px; } .map-popup img { width:100%; height:160px; object-fit:cover; border-radius:12px; margin-bottom:10px; } .map-popup h4 { margin:0 0 6px; font-size:1rem; } .map-popup p { margin:0 0 10px; line-height:1.7; font-size:.92rem; } .bottom-note { color:var(--muted); font-size:.86rem; line-height:1.8; }
    @media (max-width:1180px) { .layout { grid-template-columns:1fr; } .filters { position:relative; top:0; } #map { height:62vh; min-height:420px; } }
    @media (max-width:720px) { .shell { padding:14px; } .hero { margin:0 -14px 14px; border-radius:0 0 24px 24px; } .inline-grid { grid-template-columns:1fr; } .list-grid { grid-template-columns:1fr; } .tabs { width:100%; justify-content:space-between; } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero"><div class="hero-top"><div class="title-wrap"><h1>東京建築祭DROP VIEWER</h1><p>添付ExcelをJSON化し、地図画面と一覧画面を横断できるフィルタ連動ビューアーとして構成しています。</p></div><div class="meta-stat-grid" id="metaStats"></div></div></div>
    <div class="layout">
      <aside class="panel filters"><header><h2>フィルタ</h2></header><div class="controls">
        <div class="control"><label for="keyword">キーワード</label><input id="keyword" type="search" placeholder="本文・作者名・作品IDで検索" /></div>
        <div class="control"><label for="visibility">公開状態</label><select id="visibility"><option value="all">すべて</option><option value="公開">公開</option><option value="非公開">非公開</option></select></div>
        <div class="inline-grid"><div class="control"><label for="author">作者名</label><select id="author"><option value="all">すべて</option></select></div><div class="control"><label for="gender">性別</label><select id="gender"><option value="all">すべて</option></select></div></div>
        <div class="inline-grid"><div class="control"><label for="ageBand">年代</label><select id="ageBand"><option value="all">すべて</option></select></div><div class="control"><label for="sortOrder">並び順</label><select id="sortOrder"><option value="newest">新しい順</option><option value="oldest">古い順</option><option value="author">作者名順</option></select></div></div>
        <div class="inline-grid"><div class="control"><label for="dateFrom">投稿日（開始）</label><input id="dateFrom" type="date" /></div><div class="control"><label for="dateTo">投稿日（終了）</label><input id="dateTo" type="date" /></div></div>
        <div class="control"><label>フラグ</label><div class="seg" id="flagFilters"><button type="button" data-flag="official" data-value="all" class="active">公式：すべて</button><button type="button" data-flag="official" data-value="yes">公式のみ</button><button type="button" data-flag="operation" data-value="all" class="active">運営：すべて</button><button type="button" data-flag="operation" data-value="yes">運営のみ</button><button type="button" data-flag="hasImage" data-value="all" class="active">画像：すべて</button><button type="button" data-flag="hasImage" data-value="yes">画像あり</button></div></div>
        <div class="action-row"><button class="action-btn primary" id="applyPublicPreset" type="button">公開のみ表示</button><button class="action-btn" id="resetFilters" type="button">リセット</button></div>
        <p class="bottom-note">地図画面・一覧画面は同じフィルタ状態を共有します。ローカルで開いても動作するよう、JSONをHTML内に埋め込み済みです。なお地図タイルや外部画像はネット接続が必要です。</p>
      </div></aside>
      <main class="content-stack">
        <div class="toolbar"><div class="toolbar-left"><div class="tabs" role="tablist"><button type="button" class="active" data-screen="map" role="tab">地図画面</button><button type="button" data-screen="list" role="tab">一覧画面</button></div><div class="result-summary" id="resultSummary"></div></div><div class="legend"><span><i class="dot public"></i>公開</span><span><i class="dot private"></i>非公開</span><span><i class="dot official"></i>公式・運営</span></div></div>
        <div class="chip-row" id="activeChips"></div>
        <section class="screen active" id="screen-map"><div class="panel map-card"><div id="map"></div></div></section>
        <section class="screen" id="screen-list"><div id="listGrid" class="list-grid"></div><div id="listEmpty" class="panel empty-state" style="display:none;">条件に一致する投稿がありません。フィルタ条件を調整してください。</div></section>
      </main>
    </div>
  </div>
  <script>window.__DROP_DATA__ = null;
</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const FALLBACK_DATA = window.__DROP_DATA__ || {meta: {}, items: []};
    const state = { data: FALLBACK_DATA, items: FALLBACK_DATA.items || [], filtered: [], flagMode: { official:'all', operation:'all', hasImage:'all' }, map:null, layer:null, activeScreen:'map' };
    const els = { keyword:document.getElementById('keyword'), visibility:document.getElementById('visibility'), author:document.getElementById('author'), gender:document.getElementById('gender'), ageBand:document.getElementById('ageBand'), sortOrder:document.getElementById('sortOrder'), dateFrom:document.getElementById('dateFrom'), dateTo:document.getElementById('dateTo'), flagFilters:document.getElementById('flagFilters'), resetFilters:document.getElementById('resetFilters'), applyPublicPreset:document.getElementById('applyPublicPreset'), tabs:document.querySelectorAll('.tabs button'), screens:{map:document.getElementById('screen-map'), list:document.getElementById('screen-list')}, listGrid:document.getElementById('listGrid'), listEmpty:document.getElementById('listEmpty'), resultSummary:document.getElementById('resultSummary'), activeChips:document.getElementById('activeChips'), metaStats:document.getElementById('metaStats') };
    const placeholderSvg = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750"><rect width="100%" height="100%" fill="#e9dfd0"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="42" fill="#7a6c5c">画像を表示できません</text></svg>`);
    const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const uniq = values => [...new Set(values.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ja'));
    const formatDate = s => { if(!s) return '日付なし'; const d=new Date(s); return Number.isNaN(d.getTime()) ? s : `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; };
    const getTitle = item => item.author_name || '投稿';
    const truncate = (text, len=140) => !text ? '本文なし' : (text.length > len ? text.slice(0, len) + '…' : text);
    function populateSelect(select, options) { const current = select.value; select.innerHTML = '<option value="all">すべて</option>' + options.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join(''); if ([...select.options].some(o => o.value === current)) select.value = current; }
    function renderMeta() { const meta=state.data.meta||{}; els.metaStats.innerHTML = [['総件数',meta.total_records ?? state.items.length],['公開',meta.public_count ?? state.items.filter(i=>i.is_public).length],['非公開',meta.private_count ?? state.items.filter(i=>i.visibility==='非公開').length],['地図掲載可能',meta.valid_coordinate_count ?? state.items.filter(i=>i.has_valid_coordinates).length]].map(([k,v])=>`<span class="stat-pill">${escapeHtml(k)} <strong>${escapeHtml(v)}</strong></span>`).join(''); }
    function getFilters() { return { keyword:els.keyword.value.trim().toLowerCase(), visibility:els.visibility.value, author:els.author.value, gender:els.gender.value, ageBand:els.ageBand.value, sortOrder:els.sortOrder.value, dateFrom:els.dateFrom.value, dateTo:els.dateTo.value, flags:{...state.flagMode} }; }
    function passesFilters(item, f) { if (f.keyword) { const hay=[item.search_text,item.body,item.author_name,item.id].filter(Boolean).join(' ').toLowerCase(); if (!hay.includes(f.keyword)) return false; } if (f.visibility!=='all' && item.visibility!==f.visibility) return false; if (f.author!=='all' && item.author_name!==f.author) return false; if (f.gender!=='all' && item.gender!==f.gender) return false; if (f.ageBand!=='all' && item.age_band!==f.ageBand) return false; if (f.flags.official==='yes' && !item.is_official_user) return false; if (f.flags.operation==='yes' && !item.is_operation_member) return false; if (f.flags.hasImage==='yes' && !item.image_url) return false; if (f.dateFrom && (!item.posted_date || item.posted_date < f.dateFrom)) return false; if (f.dateTo && (!item.posted_date || item.posted_date > f.dateTo)) return false; return true; }
    function sortItems(items, order) { const x=items.slice(); if(order==='author') x.sort((a,b)=>String(a.author_name||'').localeCompare(String(b.author_name||''),'ja')); else if(order==='oldest') x.sort((a,b)=>String(a.posted_at||'').localeCompare(String(b.posted_at||''),'ja')); else x.sort((a,b)=>String(b.posted_at||'').localeCompare(String(a.posted_at||''),'ja')); return x; }
    function renderChips(f) { const chips=[]; if(f.keyword) chips.push(`検索: ${f.keyword}`); if(f.visibility!=='all') chips.push(`公開状態: ${f.visibility}`); if(f.author!=='all') chips.push(`作者名: ${f.author}`); if(f.gender!=='all') chips.push(`性別: ${f.gender}`); if(f.ageBand!=='all') chips.push(`年代: ${f.ageBand}`); if(f.dateFrom) chips.push(`開始: ${f.dateFrom}`); if(f.dateTo) chips.push(`終了: ${f.dateTo}`); if(f.flags.official==='yes') chips.push('公式のみ'); if(f.flags.operation==='yes') chips.push('運営のみ'); if(f.flags.hasImage==='yes') chips.push('画像あり'); els.activeChips.innerHTML = (chips.length ? chips : ['フィルタ未指定']).map(c => `<span class="chip">${escapeHtml(c)}</span>`).join(''); }
    function renderSummary(items) { const total=items.length, mapCount=items.filter(i=>i.has_valid_coordinates).length; els.resultSummary.innerHTML = `表示件数 <strong>${total}</strong> / 地図表示可能 <strong>${mapCount}</strong>`; }
    function buildCard(item) { const visibilityClass=item.is_public?'public':'private'; const badges=[`<span class="badge ${visibilityClass}">${escapeHtml(item.visibility||'未設定')}</span>`, item.is_official_user?'<span class="badge official">公式</span>':'', item.is_operation_member?'<span class="badge official">運営</span>':''].filter(Boolean).join(''); const meta=[item.posted_date?`投稿日: ${formatDate(item.posted_date)}`:null,item.gender,item.age_band].filter(Boolean).map(v=>`<span>${escapeHtml(v)}</span>`).join(''); const image = item.image_url ? `<img loading="lazy" src="${escapeHtml(item.image_url)}" alt="${escapeHtml(getTitle(item))}" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.onerror=null;this.src='${placeholderSvg}';this.dataset.failed='1';">` : `<div class="no-image">画像なし</div>`; const coord = item.has_valid_coordinates && item.latitude != null && item.longitude != null ? `<span class="mono">${item.latitude.toFixed(5)}, ${item.longitude.toFixed(5)}</span>` : '<span class="mono">位置情報なし</span>'; return `<article class="card"><div class="media">${image}<div class="badge-stack">${badges}</div></div><div class="body"><h3>${escapeHtml(getTitle(item))}</h3><div class="meta">${meta || '<span>メタ情報なし</span>'}</div><p class="desc">${escapeHtml(item.body || '本文なし')}</p><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;">${coord}<span class="mono">ID: ${escapeHtml(item.id || '-')}</span></div></div></article>`; }
    function renderList(items) { if(!items.length) { els.listGrid.innerHTML=''; els.listEmpty.style.display='block'; return; } els.listEmpty.style.display='none'; els.listGrid.innerHTML=items.map(buildCard).join(''); }
    function markerColor(item) { if(item.is_official_user || item.is_operation_member) return '#9f7a45'; if(item.is_public) return '#3f8f5c'; return '#ca6c6c'; }
    function popupHtml(item) { const image=item.image_url ? `<img src="${escapeHtml(item.image_url)}" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.onerror=null;this.src='${placeholderSvg}';">` : ''; const meta=[item.visibility,item.gender,item.age_band,item.posted_date?formatDate(item.posted_date):null].filter(Boolean).map(v=>`<span>${escapeHtml(v)}</span>`).join(''); return `<div class="map-popup">${image}<h4>${escapeHtml(getTitle(item))}</h4><p>${escapeHtml(truncate(item.body,180))}</p><div class="meta">${meta}</div><div class="mono" style="margin-top:10px;">${escapeHtml(item.id || '')}</div></div>`; }
    function initMap() { if(!window.L) return; state.map = L.map('map', { zoomControl:true, scrollWheelZoom:true }).setView([35.681236, 139.767125],11); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'&copy; OpenStreetMap contributors' }).addTo(state.map); state.layer=L.layerGroup().addTo(state.map); }
    function renderMap(items) { if(!state.map || !state.layer) return; state.layer.clearLayers(); const coords=[]; items.filter(i=>i.has_valid_coordinates).forEach(item => { const c=markerColor(item); const m=L.circleMarker([item.latitude,item.longitude],{radius:7,weight:2,color:c,fillColor:c,fillOpacity:.72}).bindPopup(popupHtml(item)); m.addTo(state.layer); coords.push([item.latitude,item.longitude]); }); if(coords.length) state.map.fitBounds(L.latLngBounds(coords).pad(.12), {maxZoom:15}); else state.map.setView([35.681236,139.767125],11); }
    function applyFilters() { const f=getFilters(); const filtered=sortItems(state.items.filter(item => passesFilters(item,f)), f.sortOrder); state.filtered=filtered; renderSummary(filtered); renderChips(f); renderMap(filtered); renderList(filtered); }
    function bind() { [els.keyword,els.visibility,els.author,els.gender,els.ageBand,els.sortOrder,els.dateFrom,els.dateTo].forEach(el => { el.addEventListener('input', applyFilters); el.addEventListener('change', applyFilters); }); els.flagFilters.addEventListener('click', e => { const btn=e.target.closest('button[data-flag]'); if(!btn) return; const flag=btn.dataset.flag, value=btn.dataset.value; state.flagMode[flag]=value; [...els.flagFilters.querySelectorAll(`button[data-flag="${flag}"]`)].forEach(b => b.classList.toggle('active', b.dataset.value===value)); applyFilters(); }); els.resetFilters.addEventListener('click', () => { els.keyword.value=''; els.visibility.value='all'; els.author.value='all'; els.gender.value='all'; els.ageBand.value='all'; els.sortOrder.value='newest'; els.dateFrom.value=''; els.dateTo.value=''; state.flagMode={ official:'all', operation:'all', hasImage:'all' }; [...els.flagFilters.querySelectorAll('button')].forEach(btn => btn.classList.remove('active')); ['official','operation','hasImage'].forEach(flag => els.flagFilters.querySelector(`button[data-flag="${flag}"][data-value="all"]`).classList.add('active')); applyFilters(); }); els.applyPublicPreset.addEventListener('click', () => { els.visibility.value='公開'; applyFilters(); }); els.tabs.forEach(btn => btn.addEventListener('click', () => { const screen=btn.dataset.screen; state.activeScreen=screen; els.tabs.forEach(t => t.classList.toggle('active', t===btn)); Object.entries(els.screens).forEach(([key,el]) => el.classList.toggle('active', key===screen)); if(state.map && screen==='map') setTimeout(() => state.map.invalidateSize(), 60); })); }
    async function hydrate() { try { const res = await fetch('./drop_data.json', {cache:'no-cache'}); if (res.ok) { state.data = await res.json(); state.items = Array.isArray(state.data.items) ? state.data.items : state.items; } } catch (e) { /* file:// では失敗しても埋め込みデータを使う */ } populateSelect(els.author, uniq(state.items.map(i=>i.author_name))); populateSelect(els.gender, uniq(state.items.map(i=>i.gender))); populateSelect(els.ageBand, uniq(state.items.map(i=>i.age_band))); renderMeta(); applyFilters(); }
    initMap(); bind(); hydrate();
  </script>

<script>
  // Safety net: if data never loaded, show error after 3 seconds
  setTimeout(function() {
    var app = document.getElementById('app');
    if (app && app.children.length === 0) {
      app.innerHTML = '<div style="text-align:center;padding:40px;color:#c00;font-size:18px;">'
        + '<p>⚠ データの読み込みに失敗しました。</p>'
        + '<p style="font-size:14px;color:#666;">drop_data.json が同じフォルダに存在するか確認してください。</p></div>';
    }
  }, 3000);
</script>
</body>
</html>
