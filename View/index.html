  <div class="shell">
    <div class="hero">
      <div class="hero-top">
        <div class="title-wrap">
          <h1>東京建築祭DROP ビューワー</h1>
          <p>添付ExcelをJSON化し、地図画面と一覧画面を横断できるフィルタ連動ビューアーとして構成しています。</p>
        </div>
        <div class="meta-stat-grid" id="metaStats"></div>
      </div>
    </div>

    <div class="layout">
      <aside class="panel filters">
        <header>
          <h2>フィルタ</h2>
        </header>
        <div class="controls">
          <div class="control">
            <label for="keyword">キーワード</label>
            <input id="keyword" type="search" placeholder="本文・作者名・作品IDで検索" />
          </div>

          <div class="control">
            <label for="visibility">公開状態</label>
            <select id="visibility">
              <option value="all">すべて</option>
              <option value="公開">公開</option>
              <option value="非公開">非公開</option>
            </select>
          </div>

          <div class="inline-grid">
            <div class="control">
              <label for="author">作者名</label>
              <select id="author"><option value="all">すべて</option></select>
            </div>
            <div class="control">
              <label for="gender">性別</label>
              <select id="gender"><option value="all">すべて</option></select>
            </div>
          </div>

          <div class="inline-grid">
            <div class="control">
              <label for="ageBand">年代</label>
              <select id="ageBand"><option value="all">すべて</option></select>
            </div>
            <div class="control">
              <label for="sortOrder">並び順</label>
              <select id="sortOrder">
                <option value="newest">新しい順</option>
                <option value="oldest">古い順</option>
                <option value="author">作者名順</option>
              </select>
            </div>
          </div>

          <div class="inline-grid">
            <div class="control">
              <label for="dateFrom">投稿日（開始）</label>
              <input id="dateFrom" type="date" />
            </div>
            <div class="control">
              <label for="dateTo">投稿日（終了）</label>
              <input id="dateTo" type="date" />
            </div>
          </div>

          <div class="control">
            <label>フラグ</label>
            <div class="seg" id="flagFilters">
              <button type="button" data-flag="official" data-value="all" class="active">公式：すべて</button>
              <button type="button" data-flag="official" data-value="yes">公式のみ</button>
              <button type="button" data-flag="operation" data-value="all" class="active">運営：すべて</button>
              <button type="button" data-flag="operation" data-value="yes">運営のみ</button>
              <button type="button" data-flag="hasImage" data-value="all" class="active">画像：すべて</button>
              <button type="button" data-flag="hasImage" data-value="yes">画像あり</button>
            </div>
          </div>

          <div class="action-row">
            <button class="action-btn primary" id="applyPublicPreset" type="button">公開のみ表示</button>
            <button class="action-btn" id="resetFilters" type="button">リセット</button>
          </div>

          <p class="bottom-note">
            地図画面・一覧画面は同じフィルタ状態を共有します。ローカルで開いても動作するよう、JSONをHTML内に埋め込み済みです。
          </p>
        </div>
      </aside>

      <main class="content-stack">
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="tabs" role="tablist">
              <button type="button" class="active" data-screen="map" role="tab">地図画面</button>
              <button type="button" data-screen="list" role="tab">一覧画面</button>
            </div>
            <div class="result-summary" id="resultSummary"></div>
          </div>
          <div class="legend">
            <span><i class="dot public"></i>公開</span>
            <span><i class="dot private"></i>非公開</span>
            <span><i class="dot official"></i>公式・運営</span>
          </div>
        </div>

        <div class="chip-row" id="activeChips"></div>

        <section class="screen active" id="screen-map">
          <div class="panel map-card">
            <div id="map"></div>
          </div>
        </section>

        <section class="screen" id="screen-list">
          <div id="listGrid" class="list-grid"></div>
          <div id="listEmpty" class="panel empty-state" style="display:none;">条件に一致する投稿がありません。フィルタ条件を調整してください。</div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const FALLBACK_DATA = JSON.parse(document.getElementById('embedded-data').textContent);
    const state = {
      data: FALLBACK_DATA,
      items: FALLBACK_DATA.items || [],
      filtered: [],
      markers: [],
      flagMode: { official: 'all', operation: 'all', hasImage: 'all' },
      map: null,
      layer: null,
      activeScreen: 'map',
    };

    const els = {
      keyword: document.getElementById('keyword'),
      visibility: document.getElementById('visibility'),
      author: document.getElementById('author'),
      gender: document.getElementById('gender'),
      ageBand: document.getElementById('ageBand'),
      sortOrder: document.getElementById('sortOrder'),
      dateFrom: document.getElementById('dateFrom'),
      dateTo: document.getElementById('dateTo'),
      flagFilters: document.getElementById('flagFilters'),
      resetFilters: document.getElementById('resetFilters'),
      applyPublicPreset: document.getElementById('applyPublicPreset'),
      tabs: document.querySelectorAll('.tabs button'),
      screens: { map: document.getElementById('screen-map'), list: document.getElementById('screen-list') },
      listGrid: document.getElementById('listGrid'),
      listEmpty: document.getElementById('listEmpty'),
      resultSummary: document.getElementById('resultSummary'),
      activeChips: document.getElementById('activeChips'),
      metaStats: document.getElementById('metaStats'),
    };

    function uniq(values) {
      return [...new Set(values.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), 'ja'));
    }

    function populateSelect(select, options) {
      const current = select.value;
      select.innerHTML = '<option value="all">すべて</option>' + options.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
      if ([...select.options].some(o => o.value === current)) select.value = current;
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;' })[ch]);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '日付なし';
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return dateStr;
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }

    function getTitle(item) {
      return item.author_name || '投稿';
    }

    function truncate(text, len = 140) {
      if (!text) return '本文なし';
      return text.length > len ? text.slice(0, len) + '…' : text;
    }

    function getFilters() {
      return {
        keyword: els.keyword.value.trim().toLowerCase(),
        visibility: els.visibility.value,
        author: els.author.value,
        gender: els.gender.value,
        ageBand: els.ageBand.value,
        sortOrder: els.sortOrder.value,
        dateFrom: els.dateFrom.value,
        dateTo: els.dateTo.value,
        flags: { ...state.flagMode },
      };
    }

    function passesFilters(item, filters) {
      if (filters.keyword) {
        const hay = [item.search_text, item.body, item.author_name, item.id].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(filters.keyword)) return false;
      }
      if (filters.visibility !== 'all' && item.visibility !== filters.visibility) return false;
      if (filters.author !== 'all' && item.author_name !== filters.author) return false;
      if (filters.gender !== 'all' && item.gender !== filters.gender) return false;
      if (filters.ageBand !== 'all' && item.age_band !== filters.ageBand) return false;
      if (filters.flags.official === 'yes' && !item.is_official_user) return false;
      if (filters.flags.operation === 'yes' && !item.is_operation_member) return false;
      if (filters.flags.hasImage === 'yes' && !item.image_url) return false;
      if (filters.dateFrom && item.posted_date && item.posted_date < filters.dateFrom) return false;
      if (filters.dateFrom && !item.posted_date) return false;
      if (filters.dateTo && item.posted_date && item.posted_date > filters.dateTo) return false;
      if (filters.dateTo && !item.posted_date) return false;
      return true;
    }

    function sortItems(items, sortOrder) {
      const sorted = items.slice();
      if (sortOrder === 'author') {
        sorted.sort((a, b) => String(a.author_name || '').localeCompare(String(b.author_name || ''), 'ja'));
      } else if (sortOrder === 'oldest') {
        sorted.sort((a, b) => String(a.posted_at || '').localeCompare(String(b.posted_at || ''), 'ja'));
      } else {
        sorted.sort((a, b) => String(b.posted_at || '').localeCompare(String(a.posted_at || ''), 'ja'));
      }
      return sorted;
    }

    function summarizeMeta() {
      const meta = state.data.meta || {};
      els.metaStats.innerHTML = [
        ['総件数', meta.total_records ?? state.items.length],
        ['公開', meta.public_count ?? state.items.filter(i => i.is_public).length],
        ['非公開', meta.private_count ?? state.items.filter(i => i.visibility === '非公開').length],
        ['地図掲載可能', meta.valid_coordinate_count ?? state.items.filter(i => i.has_valid_coordinates).length],
      ].map(([label, value]) => `<span class="stat-pill">${escapeHtml(label)} <strong>${escapeHtml(value)}</strong></span>`).join('');
    }

    function renderActiveChips(filters) {
      const chips = [];
      if (filters.keyword) chips.push(`検索: ${filters.keyword}`);
      if (filters.visibility !== 'all') chips.push(`公開状態: ${filters.visibility}`);
      if (filters.author !== 'all') chips.push(`作者名: ${filters.author}`);
      if (filters.gender !== 'all') chips.push(`性別: ${filters.gender}`);
      if (filters.ageBand !== 'all') chips.push(`年代: ${filters.ageBand}`);
      if (filters.dateFrom) chips.push(`開始: ${filters.dateFrom}`);
      if (filters.dateTo) chips.push(`終了: ${filters.dateTo}`);
      if (filters.flags.official === 'yes') chips.push('公式のみ');
      if (filters.flags.operation === 'yes') chips.push('運営のみ');
      if (filters.flags.hasImage === 'yes') chips.push('画像あり');
      els.activeChips.innerHTML = chips.length ? chips.map(c => `<span class="chip">${escapeHtml(c)}</span>`).join('') : '<span class="chip">フィルタ未指定</span>';
    }

    function renderSummary(filtered) {
      const total = filtered.length;
      const mapCount = filtered.filter(item => item.has_valid_coordinates).length;
      els.resultSummary.innerHTML = `表示件数 <strong>${total}</strong> / 地図表示可能 <strong>${mapCount}</strong>`;
    }

    function buildCard(item) {
      const visibilityClass = item.is_public ? 'public' : 'private';
      const badges = [
        `<span class="badge ${visibilityClass}">${escapeHtml(item.visibility || '未設定')}</span>`,
        item.is_official_user ? '<span class="badge official">公式</span>' : '',
        item.is_operation_member ? '<span class="badge official">運営</span>' : '',
      ].filter(Boolean).join('');
      const meta = [item.posted_date ? `投稿日: ${formatDate(item.posted_date)}` : null, item.gender, item.age_band].filter(Boolean)
        .map(v => `<span>${escapeHtml(v)}</span>`).join('');
      const image = item.image_url
        ? `<img loading="lazy" src="${escapeHtml(item.image_url)}" alt="${escapeHtml(getTitle(item))}">`
        : `<div class="no-image">画像なし</div>`;
      const coordLabel = item.has_valid_coordinates && item.latitude != null && item.longitude != null
        ? `<span class="mono">${item.latitude.toFixed(5)}, ${item.longitude.toFixed(5)}</span>`
        : '<span class="mono">位置情報なし</span>';
      return `
        <article class="card">
          <div class="media">
            ${image}
            <div class="badge-stack">${badges}</div>
          </div>
          <div class="body">
            <div class="title-row">
              <h3>${escapeHtml(getTitle(item))}</h3>
            </div>
            <div class="meta">${meta || '<span>メタ情報なし</span>'}</div>
            <p class="desc">${escapeHtml(item.body || '本文なし')}</p>
            <div class="footer-row">
              ${coordLabel}
              <span class="mono">ID: ${escapeHtml(item.id || '-')}</span>
            </div>
          </div>
        </article>
      `;
    }

    function renderList(items) {
      if (!items.length) {
        els.listGrid.innerHTML = '';
        els.listEmpty.style.display = 'block';
        return;
      }
      els.listEmpty.style.display = 'none';
      els.listGrid.innerHTML = items.map(buildCard).join('');
    }

    function markerColor(item) {
      if (item.is_official_user || item.is_operation_member) return '#9f7a45';
      if (item.is_public) return '#3f8f5c';
      return '#ca6c6c';
    }

    function buildPopup(item) {
      const image = item.image_url ? `<img src="${escapeHtml(item.image_url)}" alt="${escapeHtml(getTitle(item))}">` : '';
      const metaParts = [item.visibility, item.gender, item.age_band, item.posted_date ? formatDate(item.posted_date) : null].filter(Boolean)
        .map(v => `<span>${escapeHtml(v)}</span>`).join('');
      return `
        <div class="map-popup">
          ${image}
          <h4>${escapeHtml(getTitle(item))}</h4>
          <p>${escapeHtml(truncate(item.body, 180))}</p>
          <div class="meta">${metaParts}</div>
          <div class="mono" style="margin-top:10px;">${escapeHtml(item.id || '')}</div>
        </div>
      `;
    }

    function clearMarkers() {
      if (!state.layer) return;
      state.layer.clearLayers();
    }

    function renderMap(items) {
      if (!state.map) return;
      clearMarkers();
      const coords = [];
      items.filter(item => item.has_valid_coordinates).forEach(item => {
        const color = markerColor(item);
        const marker = L.circleMarker([item.latitude, item.longitude], {
          radius: 7,
          weight: 2,
          color,
          fillColor: color,
          fillOpacity: 0.72,
        }).bindPopup(buildPopup(item));
        marker.addTo(state.layer);
        coords.push([item.latitude, item.longitude]);
      });
      if (coords.length) {
        const bounds = L.latLngBounds(coords);
        state.map.fitBounds(bounds.pad(0.12), { maxZoom: 15 });
      } else {
        state.map.setView([35.681236, 139.767125], 11);
      }
    }

    function applyFilters() {
      const filters = getFilters();
      const filtered = sortItems(state.items.filter(item => passesFilters(item, filters)), filters.sortOrder);
      state.filtered = filtered;
      renderSummary(filtered);
      renderActiveChips(filters);
      renderMap(filtered);
      renderList(filtered);
    }

    function initMap() {
      state.map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([35.681236, 139.767125], 11);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(state.map);
      state.layer = L.layerGroup().addTo(state.map);
    }

    function bindControls() {
      [els.keyword, els.visibility, els.author, els.gender, els.ageBand, els.sortOrder, els.dateFrom, els.dateTo].forEach(el => {
        el.addEventListener('input', applyFilters);
        el.addEventListener('change', applyFilters);
      });

      els.flagFilters.addEventListener('click', (event) => {
        const btn = event.target.closest('button[data-flag]');
        if (!btn) return;
        const flag = btn.dataset.flag;
        const value = btn.dataset.value;
        state.flagMode[flag] = value;
        [...els.flagFilters.querySelectorAll(`button[data-flag="${flag}"]`)].forEach(b => b.classList.remove('active'));
        [...els.flagFilters.querySelectorAll(`button[data-flag="${flag}"][data-value="${value}"]`)].forEach(b => b.classList.add('active'));
        applyFilters();
      });

      els.resetFilters.addEventListener('click', () => {
        els.keyword.value = '';
        els.visibility.value = 'all';
        els.author.value = 'all';
        els.gender.value = 'all';
        els.ageBand.value = 'all';
        els.sortOrder.value = 'newest';
        els.dateFrom.value = '';
        els.dateTo.value = '';
        state.flagMode = { official: 'all', operation: 'all', hasImage: 'all' };
        [...els.flagFilters.querySelectorAll('button')].forEach(btn => btn.classList.remove('active'));
        ['official','operation','hasImage'].forEach(flag => {
          const target = els.flagFilters.querySelector(`button[data-flag="${flag}"][data-value="all"]`);
          if (target) target.classList.add('active');
        });
        applyFilters();
      });

      els.applyPublicPreset.addEventListener('click', () => {
        els.visibility.value = '公開';
        applyFilters();
      });

      els.tabs.forEach(btn => btn.addEventListener('click', () => {
        const screen = btn.dataset.screen;
        state.activeScreen = screen;
        els.tabs.forEach(t => t.classList.toggle('active', t === btn));
        Object.entries(els.screens).forEach(([key, el]) => el.classList.toggle('active', key === screen));
        if (state.map && screen === 'map') setTimeout(() => state.map.invalidateSize(), 60);
      }));
    }

    async function hydrateData() {
      try {
        const response = await fetch('./drop_data.json', { cache: 'no-cache' });
        if (response.ok) {
          state.data = await response.json();
          state.items = state.data.items || FALLBACK_DATA.items || [];
        } else {
          state.items = FALLBACK_DATA.items || [];
        }
      } catch (error) {
        state.items = FALLBACK_DATA.items || [];
      }
      state.items = Array.isArray(state.items) ? state.items : [];
      populateSelect(els.author, uniq(state.items.map(item => item.author_name)));
      populateSelect(els.gender, uniq(state.items.map(item => item.gender)));
      populateSelect(els.ageBand, uniq(state.items.map(item => item.age_band)));
      summarizeMeta();
      applyFilters();
    }

    initMap();
    bindControls();
    hydrateData();
  </script>
</body>
</html>
