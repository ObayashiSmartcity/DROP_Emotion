<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DROPS分析ダッシュボード - 感性の価値化</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    :root{
      --bg:#0f1117;
      --surface:#1a1d27;
      --surface2:#232736;
      --border:#2e3348;
      --text:#e4e6f0;
      --text2:#9498b0;
      --accent:#4f8cff;
      --accent2:#6c5ce7;
      --accent3:#00cec9;
      --danger:#ff6b6b;
      --success:#51cf66;
      --warn:#ffd43b;
      --radius:12px;
      --shadow:0 4px 24px rgba(0,0,0,0.28);
      --headerH:68px;
      --mainPad:20px;
      --mapTitleH:44px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    ::-webkit-scrollbar{width:7px;height:7px}
    ::-webkit-scrollbar-track{background:var(--surface)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

    header{
      height:var(--headerH);
      background:linear-gradient(135deg,#1a1d27 0%,#232736 100%);
      border-bottom:1px solid var(--border);
      padding:14px 24px;
      display:flex;
      align-items:center;
      gap:16px;
      position:sticky;
      top:0;
      z-index:1000;
      flex-shrink:0;
    }

    header h1{
      font-size:1.18rem;
      font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent3));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    header .subtitle{
      font-size:.78rem;
      color:var(--text2);
    }

    .badge{
      background:var(--accent);
      color:#fff;
      font-size:.68rem;
      padding:4px 10px;
      border-radius:999px;
      margin-left:4px;
      white-space:nowrap;
    }

    .layout{
      display:flex;
      flex:1;
      min-height:0;
      overflow:hidden;
    }

    .sidebar{
      width:290px;
      min-width:290px;
      background:var(--surface);
      border-right:1px solid var(--border);
      overflow-y:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex-shrink:0;
    }

    .sidebar h3{
      font-size:.8rem;
      color:var(--accent);
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:2px;
    }

    .filter-note{
      font-size:.72rem;
      color:var(--accent3);
      line-height:1.5;
      margin-top:-4px;
    }

    .filter-group{
      background:var(--surface2);
      border-radius:var(--radius);
      padding:12px;
    }

    .filter-group label{
      display:block;
      font-size:.75rem;
      color:var(--text2);
      margin-bottom:6px;
    }

    .filter-group select,
    .filter-group input{
      width:100%;
      background:var(--bg);
      border:1px solid var(--border);
      color:var(--text);
      padding:8px 10px;
      border-radius:8px;
      font-size:.82rem;
      outline:none;
    }

    .filter-group select:focus,
    .filter-group input:focus{
      border-color:var(--accent);
    }

    .btn{
      width:100%;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:.82rem;
      font-weight:600;
      transition:.2s;
    }

    .btn-secondary{
      background:var(--surface2);
      color:var(--text2);
      border:1px solid var(--border);
    }
    .btn-secondary:hover{background:var(--border);color:var(--text)}

    .slider-group{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .slider-group input[type=range]{flex:1;accent-color:var(--accent)}
    .slider-group .val{
      font-size:.75rem;
      color:var(--accent);
      min-width:24px;
      text-align:center;
      font-weight:700;
    }

    .main{
      flex:1;
      min-width:0;
      min-height:0;
      overflow-y:auto;
      padding:var(--mainPad);
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .tabs{
      display:flex;
      gap:4px;
      background:var(--surface);
      padding:4px;
      border-radius:var(--radius);
      flex-wrap:wrap;
      flex-shrink:0;
    }

    .tab{
      padding:9px 18px;
      border-radius:8px;
      cursor:pointer;
      font-size:.82rem;
      font-weight:600;
      color:var(--text2);
      transition:.2s;
      border:none;
      background:transparent;
    }
    .tab:hover{color:var(--text);background:var(--surface2)}
    .tab.active{background:var(--accent);color:#fff}

    .tab-content{display:none}
    .tab-content.active{display:block}

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
    }

    .fullsize-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:4px;
      box-shadow:var(--shadow);
    }

    .fullsize-card h2{
      margin:8px 12px 10px;
      font-size:1rem;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .card h2{
      font-size:1rem;
      margin-bottom:12px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .card h2 .icon,
    .fullsize-card h2 .icon{font-size:1.08rem}

    .grid3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:16px;
    }

    .stat-card{
      background:var(--surface2);
      border-radius:var(--radius);
      padding:16px;
      text-align:center;
      border:1px solid rgba(255,255,255,.03);
    }

    .stat-card .val{
      font-size:1.8rem;
      font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent3));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .stat-card .lbl{
      font-size:.74rem;
      color:var(--text2);
      margin-top:4px;
    }

    .chart-container{
      position:relative;
      width:100%;
      max-height:420px;
      min-height:360px;
    }

    .chart-container canvas{width:100%!important}

    .rank-toggle{
      display:flex;
      gap:4px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .rank-toggle button{
      padding:4px 12px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--surface2);
      color:var(--text2);
      cursor:pointer;
      font-size:.72rem;
      transition:.2s;
    }

    .rank-toggle button.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .tag{
      display:inline-block;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:999px;
      padding:3px 10px;
      font-size:.72rem;
      color:var(--text2);
      margin:2px;
    }

    .tag.highlight{
      border-color:var(--accent);
      color:var(--accent);
    }

    .tooltip-wb{
      position:relative;
      cursor:help;
      border-bottom:1px dotted var(--text2);
    }

    .tooltip-wb:hover::after{
      content:attr(data-tip);
      position:absolute;
      bottom:120%;
      left:50%;
      transform:translateX(-50%);
      background:var(--surface2);
      color:var(--text);
      padding:8px 12px;
      border-radius:8px;
      font-size:.72rem;
      white-space:pre-line;
      width:220px;
      z-index:100;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .post-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:520px;
      overflow-y:auto;
    }

    .post-item{
      display:flex;
      gap:12px;
      background:var(--surface2);
      border-radius:var(--radius);
      padding:12px;
      cursor:pointer;
      transition:.2s;
      border:1px solid transparent;
    }
    .post-item:hover{border-color:var(--accent)}

    .post-item img{
      width:86px;
      height:86px;
      object-fit:cover;
      border-radius:10px;
      flex-shrink:0;
    }

    .post-item .info{
      flex:1;
      min-width:0;
    }

    .post-item .sentence{
      font-size:.82rem;
      line-height:1.5;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .post-item .meta{
      font-size:.7rem;
      color:var(--text2);
      margin-top:6px;
      display:flex;
      gap:8px;
